<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Highlights</title>
<style>
  /* ========== Variables ========== */
  :root {
    --bg: #1e1e1e;
    --bg-dark: #111111;
    --bg-filmstrip: #111111;
    --text-label: #666666;
    --text-label-hover: #ffffff;
    --arrow: rgba(255,255,255,0.2);
    --arrow-hover: rgba(255,255,255,0.6);
    --border-thin: rgba(255,255,255,0.08);
    --border-active: rgba(255,255,255,0.8);
    --font-title: "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
    --font-mono: "SF Mono", "Courier New", "Consolas", monospace;
    --fade-duration: 0.4s;
    --hover-duration: 0.3s;
    --ease: ease-in-out;
  }

  /* ========== Reset ========== */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: var(--font-title);
    background: var(--bg);
    color: var(--text-label);
    display: flex;
    flex-direction: column;
    user-select: none;
    transition: background var(--fade-duration) var(--ease);
  }

  body.player-open {
    background: var(--bg-dark);
  }

  /* ========== Top Bar ========== */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border-thin);
    flex-shrink: 0;
  }

  .topbar__name {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-label);
  }

  .topbar__count {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-label);
  }

  /* ========== Main Stage ========== */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 0;
    padding: 20px 0;
  }

  /* ========== Cover + Player Container ========== */
  .showcase {
    width: 67%;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .showcase__media {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
  }

  .showcase__cover {
    position: absolute;
    inset: 0;
    background: #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 1;
    transition: opacity var(--fade-duration) var(--ease);
  }

  .showcase__cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .showcase__cover.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* Color placeholders for covers */
  .showcase__cover--placeholder {
    font-family: var(--font-mono);
    font-size: 12px;
    color: rgba(255,255,255,0.15);
    letter-spacing: 2px;
  }

  .showcase__player {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--fade-duration) var(--ease);
  }

  .showcase__player.active {
    opacity: 1;
    pointer-events: auto;
  }

  .showcase__player video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
    display: block;
  }

  /* ========== Close Button ========== */
  .close-btn {
    position: absolute;
    top: -32px;
    right: 0;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--text-label);
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--fade-duration) var(--ease), color var(--hover-duration) var(--ease);
  }

  .close-btn.visible {
    opacity: 1;
    pointer-events: auto;
  }

  .close-btn:hover {
    color: var(--text-label-hover);
  }

  /* ========== Plaque (label under cover) ========== */
  .plaque {
    margin-top: 18px;
    text-align: center;
    transition: opacity var(--fade-duration) var(--ease);
  }

  .plaque.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .plaque__info {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-label);
    letter-spacing: 1px;
  }

  .plaque__separator {
    margin: 0 10px;
    color: rgba(255,255,255,0.15);
  }

  .play-btn {
    margin-top: 14px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1.5px solid var(--text-label);
    background: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: border-color var(--hover-duration) var(--ease);
  }

  .play-btn:hover {
    border-color: var(--text-label-hover);
  }

  .play-btn svg {
    width: 12px;
    height: 12px;
    fill: var(--text-label);
    margin-left: 2px;
    transition: fill var(--hover-duration) var(--ease);
  }

  .play-btn:hover svg {
    fill: var(--text-label-hover);
  }

  /* ========== Navigation Arrows ========== */
  .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 20px;
    z-index: 10;
    transition: opacity var(--hover-duration) var(--ease);
  }

  .nav-arrow svg {
    width: 28px;
    height: 28px;
    stroke: var(--arrow);
    stroke-width: 1.5;
    fill: none;
    transition: stroke var(--hover-duration) var(--ease);
  }

  .nav-arrow:hover svg {
    stroke: var(--arrow-hover);
  }

  .nav-arrow--prev {
    left: 40px;
  }

  .nav-arrow--next {
    right: 40px;
  }

  .nav-arrow.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* ========== Filmstrip ========== */
  .filmstrip {
    flex-shrink: 0;
    height: 66px;
    background: var(--bg-filmstrip);
    border-top: 1px solid var(--border-thin);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 4px;
    overflow-x: auto;
    overflow-y: hidden;
    opacity: 0.3;
    transition: opacity var(--hover-duration) var(--ease);
  }

  .filmstrip:hover {
    opacity: 1;
  }

  /* Hide scrollbar */
  .filmstrip::-webkit-scrollbar {
    height: 0;
    display: none;
  }
  .filmstrip { scrollbar-width: none; }

  .filmstrip__thumb {
    flex-shrink: 0;
    height: 44px;
    aspect-ratio: 16 / 9;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color var(--hover-duration) var(--ease);
    overflow: hidden;
    background: #2a2a2a;
  }

  .filmstrip__thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .filmstrip__thumb.active {
    border-color: var(--border-active);
  }

  /* ========== Mobile Page Indicator ========== */
  .page-indicator {
    display: none;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-label);
    letter-spacing: 2px;
    text-align: center;
    padding: 8px;
  }

  /* ========== Mobile Nav Buttons ========== */
  .mobile-nav {
    display: none;
    justify-content: center;
    gap: 40px;
    padding: 8px 0 12px;
  }

  .mobile-nav button {
    background: none;
    border: 1px solid var(--border-thin);
    color: var(--text-label);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color var(--hover-duration) var(--ease), color var(--hover-duration) var(--ease);
  }

  .mobile-nav button:hover {
    border-color: var(--arrow-hover);
    color: var(--text-label-hover);
  }

  .mobile-nav button svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    stroke-width: 1.5;
    fill: none;
  }

  .mobile-nav button.hidden {
    opacity: 0.2;
    pointer-events: none;
  }

  /* ========== Responsive ========== */
  @media (max-width: 1024px) {
    .showcase { width: 85%; }
  }

  @media (max-width: 768px) {
    .showcase { width: 95%; }

    .nav-arrow { display: none; }

    .filmstrip { display: none; }

    .page-indicator { display: block; }

    .mobile-nav { display: flex; }

    .topbar { padding: 10px 16px; }

    .stage { padding: 12px 0; }

    .plaque__info { font-size: 10px; }
  }
</style>
</head>
<body>

  <!-- Top Bar -->
  <header class="topbar">
    <span class="topbar__name">[CALLSIGN] — CS HIGHLIGHTS</span>
    <span class="topbar__count" id="workCount"></span>
  </header>

  <!-- Main Stage -->
  <main class="stage">
    <!-- Left Arrow -->
    <button class="nav-arrow nav-arrow--prev hidden" id="prevBtn" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15,4 7,12 15,20"/></svg>
    </button>

    <!-- Showcase -->
    <div class="showcase">
      <div class="showcase__media" id="mediaContainer">
        <div class="showcase__cover" id="cover">
          <span class="showcase__cover--placeholder" id="coverPlaceholder"></span>
        </div>
        <div class="showcase__player" id="player">
          <button class="close-btn" id="closeBtn">&#x2715; CLOSE</button>
        </div>
      </div>
      <div class="plaque" id="plaque">
        <div class="plaque__info" id="plaqueInfo"></div>
        <button class="play-btn" id="playBtn" aria-label="Play">
          <svg viewBox="0 0 16 16"><polygon points="3,1 13,8 3,15"/></svg>
        </button>
      </div>
    </div>

    <!-- Right Arrow -->
    <button class="nav-arrow nav-arrow--next hidden" id="nextBtn" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9,4 17,12 9,20"/></svg>
    </button>
  </main>

  <!-- Mobile Page Indicator -->
  <div class="page-indicator" id="pageIndicator"></div>

  <!-- Mobile Nav -->
  <div class="mobile-nav" id="mobileNav">
    <button id="mobilePrev" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15,4 7,12 15,20"/></svg>
    </button>
    <button id="mobileNext" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9,4 17,12 9,20"/></svg>
    </button>
  </div>

  <!-- Filmstrip -->
  <nav class="filmstrip" id="filmstrip"></nav>

<script>
// ============================================================
//  在这里修改视频数据
//  title: 视频标题
//  map: 地图名
//  date: 日期
//  cover: 封面图路径（留空则用纯色占位）
//  video: 视频直链（GitHub Releases 等）
//  color: 封面占位色（仅在没有 cover 图时使用）
// ============================================================
const works = [
  {
    title: "超市口管理员",
    map: "—",
    date: "2026.04.13",
    cover: "",
    video: "https://github.com/FzRu1/game-highlights/releases/download/v1.0/_1.mp4",
    color: "#2a3040"
  },
  {
    title: "Placeholder #2",
    map: "Mirage",
    date: "2026.04.10",
    cover: "",
    video: "",
    color: "#302a2a"
  },
  {
    title: "Placeholder #3",
    map: "Dust II",
    date: "2026.04.08",
    cover: "",
    video: "",
    color: "#2a302a"
  },
  {
    title: "Placeholder #4",
    map: "Nuke",
    date: "2026.04.05",
    cover: "",
    video: "",
    color: "#30282e"
  },
  {
    title: "Placeholder #5",
    map: "Ancient",
    date: "2026.04.01",
    cover: "",
    video: "",
    color: "#28302e"
  }
];

// ============================================================
//  State
// ============================================================
let currentIndex = 0;
let isPlayerOpen = false;

// ============================================================
//  DOM refs
// ============================================================
const coverEl = document.getElementById('cover');
const coverPlaceholder = document.getElementById('coverPlaceholder');
const playerEl = document.getElementById('player');
const closeBtn = document.getElementById('closeBtn');
const playBtn = document.getElementById('playBtn');
const plaqueEl = document.getElementById('plaque');
const plaqueInfo = document.getElementById('plaqueInfo');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const filmstrip = document.getElementById('filmstrip');
const workCount = document.getElementById('workCount');
const pageIndicator = document.getElementById('pageIndicator');
const mobilePrev = document.getElementById('mobilePrev');
const mobileNext = document.getElementById('mobileNext');

// ============================================================
//  Init
// ============================================================
function init() {
  workCount.textContent = works.length + ' WORKS';
  buildFilmstrip();
  showWork(0);
  setupKeyboard();
  setupSwipe();
}

// ============================================================
//  Show a work by index
// ============================================================
function showWork(index) {
  // Close player if open
  if (isPlayerOpen) closePlayer();

  currentIndex = index;
  const work = works[index];

  // Cover
  if (work.cover) {
    coverEl.innerHTML = `<img src="${work.cover}" alt="${work.title}">`;
  } else {
    coverEl.style.background = work.color || '#2a2a2a';
    coverEl.innerHTML = `<span class="showcase__cover--placeholder">${work.title.toUpperCase()}</span>`;
  }
  coverEl.classList.remove('hidden');

  // Plaque
  plaqueInfo.innerHTML = `${work.title}<span class="plaque__separator">&mdash;</span>${work.map}<span class="plaque__separator">&mdash;</span>${work.date}`;
  plaqueEl.classList.remove('hidden');

  // Arrows
  prevBtn.classList.toggle('hidden', index === 0);
  nextBtn.classList.toggle('hidden', index === works.length - 1);
  mobilePrev.classList.toggle('hidden', index === 0);
  mobileNext.classList.toggle('hidden', index === works.length - 1);

  // Filmstrip active state
  document.querySelectorAll('.filmstrip__thumb').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });

  // Scroll filmstrip to show active thumb
  const activeThumb = filmstrip.children[index];
  if (activeThumb) {
    activeThumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }

  // Page indicator (mobile)
  pageIndicator.textContent = `${index + 1} / ${works.length}`;

  // Play button visibility
  playBtn.style.display = work.video ? '' : 'none';
}

// ============================================================
//  Player open / close
// ============================================================
function openPlayer() {
  const work = works[currentIndex];
  if (!work.video) return;

  // Insert video element only on play (performance)
  playerEl.innerHTML = `
    <button class="close-btn visible" id="closeBtnInner">&#x2715; CLOSE</button>
    <video
      src="${work.video}"
      controls
      autoplay
      playsinline
      preload="metadata"
    ></video>
  `;

  document.getElementById('closeBtnInner').addEventListener('click', closePlayer);

  coverEl.classList.add('hidden');
  playerEl.classList.add('active');
  plaqueEl.classList.add('hidden');
  document.body.classList.add('player-open');
  isPlayerOpen = true;
}

function closePlayer() {
  playerEl.classList.remove('active');
  coverEl.classList.remove('hidden');
  plaqueEl.classList.remove('hidden');
  document.body.classList.remove('player-open');
  isPlayerOpen = true;

  // Wait for fade out then destroy video to stop playback
  setTimeout(() => {
    playerEl.innerHTML = '';
    isPlayerOpen = false;
  }, 400);
}

// ============================================================
//  Filmstrip
// ============================================================
function buildFilmstrip() {
  filmstrip.innerHTML = works.map((w, i) => {
    if (w.cover) {
      return `<div class="filmstrip__thumb" data-index="${i}"><img src="${w.cover}" alt="${w.title}"></div>`;
    } else {
      return `<div class="filmstrip__thumb" data-index="${i}" style="background:${w.color || '#2a2a2a'}"></div>`;
    }
  }).join('');

  filmstrip.addEventListener('click', (e) => {
    const thumb = e.target.closest('.filmstrip__thumb');
    if (!thumb) return;
    showWork(parseInt(thumb.dataset.index));
  });
}

// ============================================================
//  Navigation
// ============================================================
function goPrev() {
  if (currentIndex > 0) showWork(currentIndex - 1);
}

function goNext() {
  if (currentIndex < works.length - 1) showWork(currentIndex + 1);
}

prevBtn.addEventListener('click', goPrev);
nextBtn.addEventListener('click', goNext);
mobilePrev.addEventListener('click', goPrev);
mobileNext.addEventListener('click', goNext);
playBtn.addEventListener('click', openPlayer);

// ========== Keyboard ==========
function setupKeyboard() {
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') goPrev();
    if (e.key === 'ArrowRight') goNext();
    if (e.key === 'Escape' && isPlayerOpen) closePlayer();
  });
}

// ========== Touch Swipe (mobile) ==========
function setupSwipe() {
  let touchStartX = 0;
  let touchEndX = 0;
  const stage = document.querySelector('.stage');

  stage.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });

  stage.addEventListener('touchend', (e) => {
    touchEndX = e.changedTouches[0].screenX;
    const diff = touchStartX - touchEndX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) goNext();
      else goPrev();
    }
  }, { passive: true });
}

// ============================================================
//  Start
// ============================================================
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
