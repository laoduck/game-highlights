<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Highlights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ========== Variables ========== */
  :root {
    --bg: #1a1a2e;
    --bg-dark: #0f0f1a;
    --bg-filmstrip: #111122;
    --text-label: #777777;
    --text-label-hover: #ffffff;
    --arrow: rgba(240,165,0,0.2);
    --arrow-hover: rgba(240,165,0,0.55);
    --border-thin: rgba(240,165,0,0.1);
    --border-active: rgba(240,165,0,0.8);
    --font-title: "Rajdhani", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    --font-mono: "Rajdhani", "Noto Sans SC", monospace;
    --fade-duration: 0.4s;
    --hover-duration: 0.3s;
    --ease: ease-in-out;
    --ease-expo: cubic-bezier(0.16, 1, 0.3, 1);
    --slide-x: 0px;
    --ambient-color: rgba(240, 165, 0, 0.15);
    --ambient-spread: 120px;
    --cursor-x: 50%;
    --cursor-y: 50%;
    /* Accent colors — gold/orange system */
    --accent-1: #f0a500;
    --accent-2: #ff7b00;
    --accent-3: #ffd000;
    --accent-glow-1: rgba(240, 165, 0, 0.3);
    --accent-glow-2: rgba(255, 123, 0, 0.25);
    --accent-glow-3: rgba(255, 208, 0, 0.2);
    /* Cut-corner clip paths */
    --clip-media: polygon(14px 0, 100% 0, 100% calc(100% - 14px), calc(100% - 14px) 100%, 0 100%, 0 14px);
    --clip-thumb: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
    --clip-btn: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px);
  }

  /* ========== Keyframes ========== */

  /* Page entrance */
  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeScaleIn {
    from { opacity: 0; transform: scale(0.92); filter: brightness(0.5); }
    to   { opacity: 1; transform: scale(1);    filter: brightness(1); }
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Cover Ken Burns */
  @keyframes kenBurns {
    from { transform: scale(1); }
    to   { transform: scale(1.06); }
  }

  /* Play button pulse */
  @keyframes playPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(240,165,0,0.3), 0 0 14px rgba(255,123,0,0.08); }
    50%      { box-shadow: 0 0 0 11px rgba(240,165,0,0), 0 0 28px rgba(240,165,0,0.12); }
  }

  /* Cover directional transition (uses --slide-x) */
  @keyframes coverOut {
    from { opacity: 1; transform: scale(1)    translateX(0);              filter: brightness(1); }
    to   { opacity: 0; transform: scale(0.97) translateX(var(--slide-x)); filter: brightness(0.5); }
  }

  @keyframes coverIn {
    from { opacity: 0; transform: scale(0.97) translateX(var(--slide-x)); filter: brightness(0.5); }
    to   { opacity: 1; transform: scale(1)    translateX(0);              filter: brightness(1); }
  }

  /* Plaque slide up */
  @keyframes plaqueIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Player reveal / dismiss */
  @keyframes playerReveal {
    from { opacity: 0; transform: scale(0.93); filter: brightness(1.8); }
    to   { opacity: 1; transform: scale(1);    filter: brightness(1); }
  }

  @keyframes playerDismiss {
    from { opacity: 1; transform: scale(1);    }
    to   { opacity: 0; transform: scale(0.96); }
  }

  /* Close button entrance */
  @keyframes closeBtnSlideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Active filmstrip thumb glow */
  @keyframes borderGlow {
    0%, 100% { border-color: rgba(240,165,0,0.4);  box-shadow: 0 0 6px rgba(240,165,0,0.1), 0 -4px 18px rgba(240,165,0,0.06); }
    50%      { border-color: rgba(240,165,0,0.9);   box-shadow: 0 0 16px rgba(255,123,0,0.2), 0 -6px 26px rgba(240,165,0,0.1); }
  }

  /* Scan line sweep (one-shot on load) */
  @keyframes scanSweep {
    from { transform: translateY(-100%); }
    to   { transform: translateY(100vh); }
  }

  /* Light sweep across cover on transition */
  @keyframes lightSweep {
    from { transform: translateX(-100%) skewX(-15deg); }
    to   { transform: translateX(200%) skewX(-15deg); }
  }

  /* Player open flash */
  @keyframes flashBurst {
    0%   { opacity: 0.7; }
    100% { opacity: 0; }
  }

  /* Ambient glow pulse */
  @keyframes ambientPulse {
    0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
    50%      { opacity: 0.7; transform: translate(-50%, -50%) scale(1.06); }
  }

  /* Topbar accent light */
  @keyframes topbarLight {
    0%   { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  /* ========== Reset ========== */
  *, *::before, *::after {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }

  body {
    font-family: var(--font-title);
    background: var(--bg);
    color: var(--text-label);
    display: flex;
    flex-direction: column;
    user-select: none;
    transition: background 0.6s var(--ease-expo);
  }

  body.player-open {
    background: var(--bg-dark);
  }

  /* One-shot scan line on page load */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: linear-gradient(
      180deg,
      transparent 0%,
      rgba(240,165,0,0.04) 40%,
      rgba(255,123,0,0.08) 50%,
      rgba(240,165,0,0.04) 60%,
      transparent 100%
    );
    height: 120px;
    width: 100%;
    pointer-events: none;
    z-index: 9999;
    animation: scanSweep 0.7s cubic-bezier(0.4, 0, 0.2, 1) 0.1s both;
    opacity: 0;
    animation-fill-mode: forwards;
  }

  /* ========== Top Bar ========== */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border-thin);
    flex-shrink: 0;
    animation: fadeSlideDown 0.7s var(--ease-expo) both;
    position: relative;
  }

  /* Animated accent light under topbar */
  .topbar::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(
      90deg,
      transparent 0%,
      transparent 30%,
      var(--accent-1) 42%,
      var(--accent-2) 50%,
      var(--accent-3) 58%,
      transparent 70%,
      transparent 100%
    );
    background-size: 200% 100%;
    animation: topbarLight 8s ease-in-out infinite;
    opacity: 0.6;
  }

  .topbar__name {
    font-family: "Rajdhani", var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-label);
  }

  .topbar__count {
    font-family: "Rajdhani", var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(240,165,0,0.4);
  }

  /* ========== Main Stage ========== */
  .stage {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    min-height: 0;
    padding: 20px 0;
    overflow: hidden;
  }

  /* Cursor-following light */
  .stage::before {
    content: '';
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(240,165,0,0.04) 0%, rgba(255,123,0,0.015) 40%, transparent 70%);
    left: var(--cursor-x);
    top: var(--cursor-y);
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 0;
    transition: left 0.3s ease-out, top 0.3s ease-out;
  }

  /* ========== Cover + Player Container ========== */
  .showcase {
    width: 67%;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeScaleIn 0.9s var(--ease-expo) 0.15s both;
    z-index: 1;
  }

  /* Ambient backlight glow behind showcase */
  .showcase::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 115%;
    height: 140%;
    transform: translate(-50%, -50%);
    background: radial-gradient(ellipse at 35% 50%, var(--accent-glow-1) 0%, transparent 60%),
                radial-gradient(ellipse at 65% 50%, var(--accent-glow-2) 0%, transparent 60%);
    filter: blur(50px);
    pointer-events: none;
    z-index: -1;
    animation: ambientPulse 6s ease-in-out infinite;
    transition: background 0.8s var(--ease-expo);
  }

  .showcase__media {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    /* Sci-fi cut corners */
    clip-path: var(--clip-media);
    transition: filter 0.6s var(--ease-expo);
  }

  /* Cut-corner gold frame border (sits behind media on showcase) */
  .showcase::after {
    content: '';
    position: absolute;
    top: -1px;
    left: -1px;
    width: calc(100% + 2px);
    aspect-ratio: 16 / 9;
    clip-path: var(--clip-media);
    background: linear-gradient(135deg, rgba(240,165,0,0.25) 0%, rgba(240,165,0,0.06) 50%, rgba(255,123,0,0.25) 100%);
    pointer-events: none;
    z-index: 0;
  }

  /* Light sweep overlay (triggered via JS class) */
  .showcase__media .light-sweep {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      transparent 0%,
      transparent 35%,
      rgba(240,165,0,0.08) 42%,
      rgba(255,123,0,0.14) 50%,
      rgba(240,165,0,0.08) 58%,
      transparent 65%,
      transparent 100%
    );
    pointer-events: none;
    z-index: 4;
    animation: lightSweep 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  /* Player open flash overlay (triggered via JS class) */
  .showcase__media .flash-overlay {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(240,165,0,0.5) 0%, rgba(255,123,0,0.2) 50%, transparent 100%);
    pointer-events: none;
    z-index: 5;
    animation: flashBurst 0.35s ease-out forwards;
  }

  /* CRT scan-line overlay */
  .showcase__media::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.035) 2px,
      rgba(0,0,0,0.035) 4px
    );
    pointer-events: none;
    z-index: 3;
  }

  /* Subtle vignette */
  .showcase__media::before {
    content: '';
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 80px rgba(0,0,0,0.4);
    pointer-events: none;
    z-index: 2;
  }

  .showcase__cover {
    position: absolute;
    inset: 0;
    background: #2a2a2a;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 1;
    will-change: transform, opacity, filter;
    transition: opacity var(--fade-duration) var(--ease);
  }

  .showcase__cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    animation: kenBurns 20s ease-in-out infinite alternate;
    will-change: transform;
  }

  .showcase__cover.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* Directional cover transitions */
  .showcase__cover.cover-out {
    animation: coverOut 0.35s var(--ease-expo) forwards;
    pointer-events: none;
  }

  .showcase__cover.cover-in {
    animation: coverIn 0.45s var(--ease-expo) both;
  }

  /* Color placeholders for covers */
  .showcase__cover--placeholder {
    font-family: "Rajdhani", var(--font-mono);
    font-size: 14px;
    font-weight: 600;
    color: rgba(240,165,0,0.12);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  .showcase__player {
    position: absolute;
    inset: 0;
    opacity: 0;
    pointer-events: none;
    will-change: transform, opacity;
    z-index: 1;
  }

  .showcase__player.active {
    opacity: 1;
    pointer-events: auto;
    animation: playerReveal 0.55s var(--ease-expo) both;
  }

  .showcase__player.dismissing {
    animation: playerDismiss 0.4s var(--ease-expo) forwards;
    pointer-events: none;
  }

  .showcase__player video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
    display: block;
  }

  /* ========== Close Button ========== */
  .close-btn {
    position: absolute;
    top: -32px;
    right: 0;
    font-family: "Rajdhani", var(--font-mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--text-label);
    background: none;
    border: none;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
    transition: color var(--hover-duration) var(--ease);
    z-index: 5;
  }

  .close-btn.visible {
    opacity: 1;
    pointer-events: auto;
    animation: closeBtnSlideIn 0.4s var(--ease-expo) 0.2s both;
  }

  .close-btn:hover {
    color: var(--text-label-hover);
    text-shadow: 0 0 14px rgba(240,165,0,0.4);
  }

  /* ========== Plaque (label under cover) ========== */
  .plaque {
    margin-top: 18px;
    text-align: center;
    will-change: transform, opacity;
  }

  .plaque.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .plaque.animate-in {
    animation: plaqueIn 0.5s var(--ease-expo) 0.12s both;
  }

  .plaque__info {
    font-family: "Rajdhani", "Noto Sans SC", sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-label);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .plaque__separator {
    margin: 0 10px;
    color: rgba(240,165,0,0.2);
  }

  .play-btn {
    margin-top: 14px;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 1.5px solid rgba(240,165,0,0.45);
    background: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: border-color var(--hover-duration) var(--ease),
                transform var(--hover-duration) var(--ease-expo),
                box-shadow var(--hover-duration) var(--ease);
    animation: playPulse 2.8s ease-in-out infinite;
  }

  .play-btn:hover {
    border-color: var(--accent-1);
    transform: scale(1.18);
    box-shadow: 0 0 24px rgba(240,165,0,0.25), 0 0 60px rgba(255,123,0,0.1);
    animation: none;
  }

  .play-btn svg {
    width: 12px;
    height: 12px;
    fill: rgba(240,165,0,0.55);
    margin-left: 2px;
    transition: fill var(--hover-duration) var(--ease);
  }

  .play-btn:hover svg {
    fill: var(--accent-1);
  }

  /* ========== Navigation Arrows ========== */
  .nav-arrow {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    padding: 20px;
    z-index: 10;
    transition: opacity var(--hover-duration) var(--ease),
                transform var(--hover-duration) var(--ease-expo);
  }

  .nav-arrow svg {
    width: 28px;
    height: 28px;
    stroke: var(--arrow);
    stroke-width: 1.5;
    fill: none;
    transition: stroke var(--hover-duration) var(--ease),
                filter var(--hover-duration) var(--ease);
  }

  .nav-arrow:hover svg {
    stroke: var(--arrow-hover);
    filter: drop-shadow(0 0 10px rgba(240,165,0,0.2));
  }

  .nav-arrow--prev {
    left: 40px;
  }

  .nav-arrow--prev:hover {
    transform: translateY(-50%) translateX(-5px);
    filter: drop-shadow(0 0 14px rgba(240,165,0,0.12));
  }

  .nav-arrow--next {
    right: 40px;
  }

  .nav-arrow--next:hover {
    transform: translateY(-50%) translateX(5px);
    filter: drop-shadow(0 0 14px rgba(240,165,0,0.12));
  }

  .nav-arrow.hidden {
    opacity: 0;
    pointer-events: none;
  }

  /* ========== Filmstrip ========== */
  .filmstrip {
    flex-shrink: 0;
    height: 66px;
    background: var(--bg-filmstrip);
    border-top: 1px solid var(--border-thin);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 4px;
    overflow-x: auto;
    overflow-y: hidden;
    opacity: 0.3;
    transition: opacity var(--hover-duration) var(--ease);
    animation: fadeSlideUp 0.7s var(--ease-expo) 0.35s both;
  }

  .filmstrip:hover {
    opacity: 1;
  }

  /* Hide scrollbar */
  .filmstrip::-webkit-scrollbar {
    height: 0;
    display: none;
  }
  .filmstrip { scrollbar-width: none; }

  .filmstrip__thumb {
    flex-shrink: 0;
    height: 44px;
    aspect-ratio: 16 / 9;
    cursor: pointer;
    border: 1px solid transparent;
    transition: border-color var(--hover-duration) var(--ease),
                transform var(--hover-duration) var(--ease-expo),
                filter var(--hover-duration) var(--ease),
                box-shadow var(--hover-duration) var(--ease);
    overflow: hidden;
    background: #2a2a2a;
    position: relative;
    clip-path: var(--clip-thumb);
  }

  .filmstrip__thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .filmstrip__thumb:hover {
    transform: scale(1.15);
    filter: brightness(1.25);
    z-index: 2;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5), 0 0 20px rgba(240,165,0,0.1);
  }

  .filmstrip__thumb.active {
    animation: borderGlow 2.2s ease-in-out infinite;
    transform: scale(1.05);
  }

  .filmstrip__thumb.active:hover {
    transform: scale(1.15);
  }

  /* ========== Mobile Page Indicator ========== */
  .page-indicator {
    display: none;
    font-family: "Rajdhani", var(--font-mono);
    font-size: 13px;
    font-weight: 600;
    color: rgba(240,165,0,0.4);
    letter-spacing: 3px;
    text-align: center;
    padding: 8px;
  }

  /* ========== Mobile Nav Buttons ========== */
  .mobile-nav {
    display: none;
    justify-content: center;
    gap: 40px;
    padding: 8px 0 12px;
  }

  .mobile-nav button {
    background: none;
    border: 1px solid var(--border-thin);
    color: var(--text-label);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color var(--hover-duration) var(--ease),
                color var(--hover-duration) var(--ease),
                transform var(--hover-duration) var(--ease-expo),
                box-shadow var(--hover-duration) var(--ease);
  }

  .mobile-nav button:hover {
    border-color: rgba(240,165,0,0.5);
    color: var(--text-label-hover);
    transform: scale(1.1);
    box-shadow: 0 0 18px rgba(240,165,0,0.1);
  }

  .mobile-nav button:active {
    transform: scale(0.95);
  }

  .mobile-nav button svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    stroke-width: 1.5;
    fill: none;
  }

  .mobile-nav button.hidden {
    opacity: 0.2;
    pointer-events: none;
  }

  /* ========== Responsive ========== */
  @media (max-width: 1024px) {
    .showcase { width: 85%; }
  }

  @media (max-width: 768px) {
    .showcase { width: 95%; }

    .nav-arrow { display: none; }

    .filmstrip { display: none; }

    .page-indicator { display: block; }

    .mobile-nav { display: flex; }

    .topbar { padding: 10px 16px; }

    .stage { padding: 12px 0; }

    .plaque__info { font-size: 10px; }
  }
</style>
</head>
<body>

  <!-- Top Bar -->
  <header class="topbar">
    <span class="topbar__name">[CALLSIGN] — CS HIGHLIGHTS</span>
    <span class="topbar__count" id="workCount"></span>
  </header>

  <!-- Main Stage -->
  <main class="stage">
    <!-- Left Arrow -->
    <button class="nav-arrow nav-arrow--prev hidden" id="prevBtn" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15,4 7,12 15,20"/></svg>
    </button>

    <!-- Showcase -->
    <div class="showcase">
      <div class="showcase__media" id="mediaContainer">
        <div class="showcase__cover" id="cover">
          <span class="showcase__cover--placeholder" id="coverPlaceholder"></span>
        </div>
        <div class="showcase__player" id="player">
          <button class="close-btn" id="closeBtn">&#x2715; CLOSE</button>
        </div>
      </div>
      <div class="plaque" id="plaque">
        <div class="plaque__info" id="plaqueInfo"></div>
        <button class="play-btn" id="playBtn" aria-label="Play">
          <svg viewBox="0 0 16 16"><polygon points="3,1 13,8 3,15"/></svg>
        </button>
      </div>
    </div>

    <!-- Right Arrow -->
    <button class="nav-arrow nav-arrow--next hidden" id="nextBtn" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9,4 17,12 9,20"/></svg>
    </button>
  </main>

  <!-- Mobile Page Indicator -->
  <div class="page-indicator" id="pageIndicator"></div>

  <!-- Mobile Nav -->
  <div class="mobile-nav" id="mobileNav">
    <button id="mobilePrev" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15,4 7,12 15,20"/></svg>
    </button>
    <button id="mobileNext" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9,4 17,12 9,20"/></svg>
    </button>
  </div>

  <!-- Filmstrip -->
  <nav class="filmstrip" id="filmstrip"></nav>

<script>
// ============================================================
//  在这里修改视频数据
//  title: 视频标题
//  map: 地图名
//  date: 日期
//  cover: 封面图路径（留空则用纯色占位）
//  video: 视频直链（GitHub Releases 等）
//  color: 封面占位色（仅在没有 cover 图时使用）
// ============================================================
const works = [
  {
    title: "超市口管理员",
    map: "—",
    date: "2026.04.13",
    cover: "covers/001.jpg",
    video: "https://github.com/FzRu1/game-highlights/releases/download/v1.0/_1.mp4",
    color: "#2a3040"
  },
  {
    title: "Placeholder #2",
    map: "Mirage",
    date: "2026.04.10",
    cover: "",
    video: "",
    color: "#2d2535"
  },
  {
    title: "Placeholder #3",
    map: "Dust II",
    date: "2026.04.08",
    cover: "",
    video: "",
    color: "#25283a"
  },
  {
    title: "Placeholder #4",
    map: "Nuke",
    date: "2026.04.05",
    cover: "",
    video: "",
    color: "#2a2240"
  },
  {
    title: "Placeholder #5",
    map: "Ancient",
    date: "2026.04.01",
    cover: "",
    video: "",
    color: "#222d38"
  }
];

// ============================================================
//  State
// ============================================================
let currentIndex = 0;
let isPlayerOpen = false;
let isTransitioning = false;
let transitionTimer = null;

// ============================================================
//  DOM refs
// ============================================================
const coverEl = document.getElementById('cover');
const coverPlaceholder = document.getElementById('coverPlaceholder');
const playerEl = document.getElementById('player');
const closeBtn = document.getElementById('closeBtn');
const playBtn = document.getElementById('playBtn');
const plaqueEl = document.getElementById('plaque');
const plaqueInfo = document.getElementById('plaqueInfo');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const filmstrip = document.getElementById('filmstrip');
const workCount = document.getElementById('workCount');
const pageIndicator = document.getElementById('pageIndicator');
const mobilePrev = document.getElementById('mobilePrev');
const mobileNext = document.getElementById('mobileNext');

// ============================================================
//  Init
// ============================================================
function init() {
  workCount.textContent = works.length + ' WORKS';
  buildFilmstrip();
  showWork(0, true);
  setupKeyboard();
  setupSwipe();
  setupCursorLight();

  // Set initial ambient color
  updateAmbientColor(0);

  // Remove one-shot scan line after it plays
  document.body.addEventListener('animationend', (e) => {
    if (e.target === document.body) {
      document.body.style.setProperty('--scan-done', '1');
    }
  });
}

// ============================================================
//  Show a work by index
// ============================================================
function showWork(index, isInitial) {
  if (index === currentIndex && !isInitial) return;
  if (isPlayerOpen) closePlayer();

  // Cancel pending transition
  if (transitionTimer) {
    clearTimeout(transitionTimer);
    transitionTimer = null;
  }

  // Determine direction: 1 = forward, -1 = backward
  const direction = index > currentIndex ? 1 : -1;

  // Clear any lingering animation classes
  coverEl.classList.remove('cover-out', 'cover-in', 'hidden');

  if (isInitial) {
    // First load: no directional slide, content just appears with page entrance
    applyWorkContent(index);
    plaqueEl.classList.remove('hidden');
    plaqueEl.classList.add('animate-in');
  } else {
    // Directional transition
    isTransitioning = true;

    // Set slide direction via CSS custom property
    coverEl.style.setProperty('--slide-x', direction > 0 ? '-30px' : '30px');
    coverEl.classList.add('cover-out');

    // Fade out plaque immediately
    plaqueEl.classList.remove('animate-in');
    plaqueEl.classList.add('hidden');

    transitionTimer = setTimeout(() => {
      // Swap content
      coverEl.classList.remove('cover-out');
      applyWorkContent(index);

      // Slide in from opposite side
      coverEl.style.setProperty('--slide-x', direction > 0 ? '30px' : '-30px');
      void coverEl.offsetWidth; // force reflow to restart animation
      coverEl.classList.add('cover-in');

      // Light sweep effect
      triggerLightSweep();

      // Update ambient backlight color
      updateAmbientColor(index);

      // Plaque animates in
      plaqueEl.classList.remove('hidden');
      void plaqueEl.offsetWidth;
      plaqueEl.classList.add('animate-in');

      isTransitioning = false;
      transitionTimer = null;

      // Clean up cover-in class after animation ends
      coverEl.addEventListener('animationend', function handler() {
        coverEl.classList.remove('cover-in');
        coverEl.removeEventListener('animationend', handler);
      });
    }, 300);
  }

  currentIndex = index;
  updateNavState(index);
}

// ============================================================
//  Apply work content (no animation logic, just DOM update)
// ============================================================
function applyWorkContent(index) {
  const work = works[index];

  // Cover
  if (work.cover) {
    coverEl.innerHTML = `<img src="${work.cover}" alt="${work.title}">`;
  } else {
    coverEl.style.background = work.color || '#2a2a2a';
    coverEl.innerHTML = `<span class="showcase__cover--placeholder">${work.title.toUpperCase()}</span>`;
  }

  // Plaque text
  plaqueInfo.innerHTML = `${work.title}<span class="plaque__separator">&mdash;</span>${work.map}<span class="plaque__separator">&mdash;</span>${work.date}`;

  // Play button visibility
  playBtn.style.display = work.video ? '' : 'none';
}

// ============================================================
//  Update navigation state (arrows, filmstrip, indicators)
// ============================================================
function updateNavState(index) {
  // Arrows
  prevBtn.classList.toggle('hidden', index === 0);
  nextBtn.classList.toggle('hidden', index === works.length - 1);
  mobilePrev.classList.toggle('hidden', index === 0);
  mobileNext.classList.toggle('hidden', index === works.length - 1);

  // Filmstrip active state
  document.querySelectorAll('.filmstrip__thumb').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });

  // Scroll filmstrip to show active thumb
  const activeThumb = filmstrip.children[index];
  if (activeThumb) {
    activeThumb.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }

  // Page indicator (mobile)
  pageIndicator.textContent = `${index + 1} / ${works.length}`;
}

// ============================================================
//  Player open / close
// ============================================================
function openPlayer() {
  const work = works[currentIndex];
  if (!work.video) return;

  // Insert video element only on play
  playerEl.innerHTML = `
    <button class="close-btn visible" id="closeBtnInner">&#x2715; CLOSE</button>
    <video
      src="${work.video}"
      controls
      autoplay
      playsinline
      preload="metadata"
    ></video>
  `;

  document.getElementById('closeBtnInner').addEventListener('click', closePlayer);

  coverEl.classList.add('hidden');
  playerEl.classList.remove('dismissing');
  playerEl.classList.add('active');
  plaqueEl.classList.add('hidden');
  plaqueEl.classList.remove('animate-in');
  document.body.classList.add('player-open');
  isPlayerOpen = true;

  // Flash burst on player open
  triggerFlash();

  // Edge glow intensify with color
  const media = document.getElementById('mediaContainer');
  media.style.filter = 'drop-shadow(0 0 2px rgba(240,165,0,0.3)) drop-shadow(0 0 20px rgba(255,123,0,0.08))';
}

function closePlayer() {
  // Dismiss animation
  playerEl.classList.remove('active');
  playerEl.classList.add('dismissing');
  coverEl.classList.remove('hidden');
  document.body.classList.remove('player-open');

  // Plaque slides back in
  plaqueEl.classList.remove('hidden');
  void plaqueEl.offsetWidth;
  plaqueEl.classList.add('animate-in');

  // Wait for dismiss animation, then destroy video
  setTimeout(() => {
    playerEl.classList.remove('dismissing');
    playerEl.innerHTML = '';
    isPlayerOpen = false;
    // Restore normal edge glow
    const media = document.getElementById('mediaContainer');
    media.style.filter = '';
  }, 420);
}

// ============================================================
//  Filmstrip
// ============================================================
function buildFilmstrip() {
  filmstrip.innerHTML = works.map((w, i) => {
    if (w.cover) {
      return `<div class="filmstrip__thumb" data-index="${i}"><img src="${w.cover}" alt="${w.title}"></div>`;
    } else {
      return `<div class="filmstrip__thumb" data-index="${i}" style="background:${w.color || '#2a2a2a'}"></div>`;
    }
  }).join('');

  filmstrip.addEventListener('click', (e) => {
    const thumb = e.target.closest('.filmstrip__thumb');
    if (!thumb) return;
    showWork(parseInt(thumb.dataset.index));
  });
}

// ============================================================
//  Navigation
// ============================================================
function goPrev() {
  if (currentIndex > 0 && !isTransitioning) showWork(currentIndex - 1);
}

function goNext() {
  if (currentIndex < works.length - 1 && !isTransitioning) showWork(currentIndex + 1);
}

prevBtn.addEventListener('click', goPrev);
nextBtn.addEventListener('click', goNext);
mobilePrev.addEventListener('click', goPrev);
mobileNext.addEventListener('click', goNext);
playBtn.addEventListener('click', openPlayer);

// ========== Keyboard ==========
function setupKeyboard() {
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') goPrev();
    if (e.key === 'ArrowRight') goNext();
    if (e.key === 'Escape' && isPlayerOpen) closePlayer();
  });
}

// ========== Touch Swipe (mobile) ==========
function setupSwipe() {
  let touchStartX = 0;
  let touchEndX = 0;
  const stage = document.querySelector('.stage');

  stage.addEventListener('touchstart', (e) => {
    touchStartX = e.changedTouches[0].screenX;
  }, { passive: true });

  stage.addEventListener('touchend', (e) => {
    touchEndX = e.changedTouches[0].screenX;
    const diff = touchStartX - touchEndX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) goNext();
      else goPrev();
    }
  }, { passive: true });
}

// ============================================================
//  Light Effects
// ============================================================

// Cursor-following ambient light
function setupCursorLight() {
  const stage = document.querySelector('.stage');
  stage.addEventListener('mousemove', (e) => {
    const rect = stage.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    stage.style.setProperty('--cursor-x', x + 'px');
    stage.style.setProperty('--cursor-y', y + 'px');
  });
}

// Light sweep across cover on work transition
function triggerLightSweep() {
  const media = document.getElementById('mediaContainer');
  // Remove old sweep if exists
  const old = media.querySelector('.light-sweep');
  if (old) old.remove();

  const sweep = document.createElement('div');
  sweep.className = 'light-sweep';
  media.appendChild(sweep);

  sweep.addEventListener('animationend', () => sweep.remove());
}

// Flash burst on player open
function triggerFlash() {
  const media = document.getElementById('mediaContainer');
  const flash = document.createElement('div');
  flash.className = 'flash-overlay';
  media.appendChild(flash);

  flash.addEventListener('animationend', () => flash.remove());
}

// Update ambient backlight color based on current work
function updateAmbientColor(index) {
  const work = works[index];
  const color = work.color || '#2a3040';
  // Parse hex
  const r = parseInt(color.slice(1, 3), 16);
  const g = parseInt(color.slice(3, 5), 16);
  const b = parseInt(color.slice(5, 7), 16);
  // Blend work color with gold/orange accent for warm glow
  const br1 = Math.min(255, Math.round(r * 0.3 + 240 * 0.7));
  const bg1 = Math.min(255, Math.round(g * 0.3 + 165 * 0.7));
  const bb1 = Math.min(255, Math.round(b * 0.3 + 0 * 0.7));
  const br2 = Math.min(255, Math.round(r * 0.3 + 255 * 0.7));
  const bg2 = Math.min(255, Math.round(g * 0.3 + 123 * 0.7));
  const bb2 = Math.min(255, Math.round(b * 0.3 + 0 * 0.7));
  document.documentElement.style.setProperty('--accent-glow-1', `rgba(${br1}, ${bg1}, ${bb1}, 0.22)`);
  document.documentElement.style.setProperty('--accent-glow-2', `rgba(${br2}, ${bg2}, ${bb2}, 0.18)`);
}

// ============================================================
//  Start
// ============================================================
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
